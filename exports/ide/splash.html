<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silkweaver</title>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #1c1c1d;
            color: #f1f1f0;
            font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #34343a;
            box-sizing: border-box;
            user-select: none;
        }
        .brand { display: flex; align-items: center; gap: 13px; font-size: 32px; font-weight: 700; letter-spacing: .3px; }
        .brand img { width: 44px; height: 44px; }
        .brand span { color: #e56878; }
        .row { display: flex; align-items: center; gap: 9px; margin-top: 18px; color: #a6a6a4; font-size: 12px; }
        .spin {
            width: 15px; height: 15px;
            border: 2.5px solid rgba(255, 255, 255, .14);
            border-top-color: #e60012;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .studio { position: absolute; bottom: 18px; display: flex; align-items: center; gap: 7px; opacity: .8; }
        .studio img { height: 22px; }
        .studio span { font-size: 10.5px; color: #7e7e7c; letter-spacing: .02em; }
    </style>
</head>
<body>
    <div class="brand"><img src="icon.png" alt="">Silk<span>weaver</span></div>
    <div class="row"><div class="spin"></div>Loading…</div>
    <div class="studio"><img src="PWstd-Logo.png" alt=""><span>by PaperWing Studio</span></div>
</body>
</html>
